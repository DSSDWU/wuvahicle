<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงทะเบียนขอใช้รถ</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px; font-size: 16px; }
    button { padding: 12px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>ระบบลงทะเบียนขอใช้รถ</h1>

  <form id="registrationForm">
    <div class="form-group">
      <label for="studentId">รหัสนักศึกษา</label>
      <input type="text" id="studentId" required>
    </div>
    <div class="form-group">
      <label for="fullName">ชื่อ-สกุล</label>
      <input type="text" id="fullName" required>
    </div>
    <div class="form-group">
      <label for="faculty">สำนักวิชา</label>
      <input type="text" id="faculty" required>
    </div>
    <div class="form-group">
      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="text" id="phone" required>
    </div>
    <div class="form-group">
      <label for="residence">ที่พักปัจจุบัน</label>
      <input type="text" id="residence" required>
    </div>
    <div class="form-group">
      <label for="address">ที่อยู่</label>
      <input type="text" id="address" required>
    </div>
    <div class="form-group">
      <label for="emergencyContact">ผู้ติดต่อฉุกเฉิน</label>
      <input type="text" id="emergencyContact" required>
    </div>
    <div class="form-group">
      <label for="relationship">ความสัมพันธ์</label>
      <input type="text" id="relationship" required>
    </div>
    <div class="form-group">
      <label for="emergencyPhone">เบอร์โทรฉุกเฉิน</label>
      <input type="text" id="emergencyPhone" required>
    </div>
    <div class="form-group">
      <label for="carType">ประเภทรถ</label>
      <input type="text" id="carType" required>
    </div>
    <div class="form-group">
      <label for="carBrand">ยี่ห้อรถ</label>
      <input type="text" id="carBrand" required>
    </div>
    <div class="form-group">
      <label for="licensePlate">ทะเบียนรถ</label>
      <input type="text" id="licensePlate" required>
    </div>
    <div class="form-group">
      <label for="province">จังหวัด</label>
      <input type="text" id="province" required>
    </div>
    <div class="form-group">
      <label for="carColor">สีรถ</label>
      <input type="text" id="carColor" required>
    </div>
    <button type="submit">ส่งข้อมูล</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        studentId: document.getElementById('studentId').value,
        fullName: document.getElementById('fullName').value,
        faculty: document.getElementById('faculty').value,
        phone: document.getElementById('phone').value,
        residence: document.getElementById('residence').value,
        address: document.getElementById('address').value,
        emergencyContact: document.getElementById('emergencyContact').value,
        relationship: document.getElementById('relationship').value,
        emergencyPhone: document.getElementById('emergencyPhone').value,
        carType: document.getElementById('carType').value,
        carBrand: document.getElementById('carBrand').value,
        licensePlate: document.getElementById('licensePlate').value,
        province: document.getElementById('province').value,
        carColor: document.getElementById('carColor').value
      };

      fetch('https://script.google.com/macros/s/AKfycbzocIwRs56a8Wt2-yhfK8NxRI537oeehQmxratNy_XqXGQtfnkP0ODJJFe-gfen8qNU/exec', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        document.getElementById('result').innerText = result.message || 'ส่งสำเร็จ';
      })
      .catch(err => {
        document.getElementById('result').innerText = 'เกิดข้อผิดพลาด: ' + err;
      });
    });
  </script>
</body>
</html>
